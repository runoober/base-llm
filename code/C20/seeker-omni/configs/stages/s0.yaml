seed: 42

data:
  # 打包后的文本预训练 memmap（离线清洗后）。
  train_dir: data/processed/text_pretrain_packed_340_u16_offline
  val_dir: null

model:
  base: !include ../model/base_26m.yaml
  name: seeker-omni-zh-m2chatml-tok6400-s0-text
  max_seq_len: 340

train:
  stage: s0_text
  init_from: null
  device: cuda
  dtype: fp16

  epochs: 1
  batch_size: 32
  grad_accum: 1

  # 按步数控制的预训练（基于 max_steps）。
  max_steps: 180000
  lr: 3.0e-4
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 2000

  log_every: 200
  save_every: 5000
  keep_last: 2
  out_dir: checkpoints/seeker-omni-zh-m2chatml-tok6400/s0_text
